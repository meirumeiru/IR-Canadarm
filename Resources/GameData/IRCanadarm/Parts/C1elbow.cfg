PART
{
	name = ircanadarm_C1elbow
	module = Part
	author = Benjee10, Rudolf Meier

	rescaleFactor = 1
	TechRequired = advConstruction
	entryCost = 1000
	cost = 60
	category = Robotics
	subcategory = 0
	title = Kanadarm Elbow Servo Joint
	manufacturer = HabTech Consortium
	description = Powered by Infernal Robotics - Next. This elbow joint can rotate 180 degrees back on itself. 

	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,0,1,0,0
	mass = 0.016
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.2
	angularDrag = 1
	crashTolerance = 12
	breakingForce = 200
	breakingTorque = 200
	maxTemp = 2000 // = 5000
	bulkheadProfiles = size1
	tags = HabTech, robot, arm, Canadarm, Kanadarm, rotate, hinge, servo, motor, move

	MODEL
	{
		model = IRCanadarm/Parts/C1elbow
	}

	NODE
	{
		name = TopJoint
		transform = armElbow_topNode
		size = 1
	}
	NODE
	{
		name = BottomJoint
		transform = armElbow_bottomNode
		size = 1
	}

	MODULE
	{
		name = ModuleIRServo_v3
		servoName = Kanadarm Elbow

		axis = 0, 0, 1
		pointer = 1, 0, 0

		fixedMesh = base
		movingMesh = servo

		fixedMeshNode = BottomJoint

		isRotational = True

		hasMinMaxPosition = True
		minPosition = -180
		maxPosition = 0

		isFreeMoving = False

		electricChargeRequired = 2.5

		isInverted = False
		isLocked = False

		canHaveLimits = True

		hasPositionLimit = False
		minPositionLimit = -180
		maxPositionLimit = 0

		factorAcceleration = 20
		maxAcceleration = 4
		accelerationLimit = 1

		factorSpeed = 7
		maxSpeed = 4
		speedLimit = 1

		factorForce = 7
		maxForce = 30
		forceLimit = 4

		zeroNormal = 0
		zeroInvert = 0
		presetsS = -180.0|-90.0|0.0

		availableModeS = Servo
		availableInputModeS = Manual

		//invertSymmetry = False 
		soundFilePath = MagicSmokeIndustries/Sounds/infernalRoboticMotor			// Motor loop sound path
	}
	MODULE
	{
		name = ModuleCargoPart
		packedVolume = 20
	}

}
