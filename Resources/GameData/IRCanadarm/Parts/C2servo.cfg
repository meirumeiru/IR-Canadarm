PART
{
	name = ircanadarm_C2servo
	module = Part
	author = Benjee10, Rudolf Meier

	rescaleFactor = 1
	TechRequired = advConstruction
	entryCost = 1200
	cost = 100
	category = Robotics
	subcategory = 0
	title = Kanadarm2 Servo Joint
	manufacturer = HabTech Consortium
	description = Powered by Infernal Robotics - Next. This servo allows a full 360 degrees of rotation.

	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,0,1,1,0
	mass = 0.06
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.2
	angularDrag = 1
	crashTolerance = 12
	breakingForce = 200
	breakingTorque = 200
	maxTemp = 2000 // = 5000
	bulkheadProfiles = size1
	tags = HabTech, robot, arm, Canadarm2, Kanadarm2, rotate, hinge, servo, motor, move

	MODEL
	{
		model = IRCanadarm/Parts/C2servo
	}

	NODE
	{
		name = TopJoint
		transform = actuatorTopNode
		size = 1
	}
	NODE
	{
		name = BottomJoint
		transform = actuatorSideNode
		size = 1
	}

	MODULE
	{
		name = ModuleIRServo_v3
		servoName = Kanadarm2 Servo

		axis = 0, 1, 0
		pointer = 0, 0, 1

		fixedMesh = actuatorBody
		movingMesh = actuatorMesh

		fixedMeshNode = BottomJoint

		isRotational = True

		hasMinMaxPosition = False
		minPosition = -360
		maxPosition = 360

		isFreeMoving = False

		electricChargeRequired = 2.5

		isInverted = False
		isLocked = False

		canHaveLimits = True

		hasPositionLimit = False
		minPositionLimit = -360
		maxPositionLimit = 360

		factorAcceleration = 20
		maxAcceleration = 20
		accelerationLimit = 4

		factorSpeed = 7
		maxSpeed = 20
		speedLimit = 1

		factorForce = 7
		maxForce = 30
		forceLimit = 4

		zeroNormal = 0
		zeroInvert = 0
		presetsS = -180.0|-90.0|0.0|90.0|180.0

		availableModeS = Servo
		availableInputModeS = Manual|Linked

		//invertSymmetry = False
		soundFilePath = MagicSmokeIndustries/Sounds/infernalRoboticMotor		// Motor loop sound path
	}

	MODULE
	{
		name = ModuleCargoPart
		packedVolume = 20
	}
}
